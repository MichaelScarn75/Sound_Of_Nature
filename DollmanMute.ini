; DollmanMute public release config.
; Set VerboseLog=1 only when collecting debug logs.
; EnablePlayerVoiceHooks=0 is recommended after game updates.
; Press F10 while reproducing a sound to insert MARK lines into the log.
; ScannerMode is a 3-level scanner audio setting.
; ScannerMode=0 keeps scanner audio unchanged.
; ScannerMode=1 reduces scanner intensity:
;   keeps 4235852663, blocks 4094913469 and 2611919341.
; ScannerMode=2 fully mutes scanner audio:
;   blocks 4235852663, 4094913469, and 2611919341.

[General]
Enabled=1
VerboseLog=0
EnablePlayerVoiceHooks=0
EnableMarkHotkey=1
MarkHotkeyVirtualKey=121
ScannerMode=0
